name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: "oneworks-ai/app ref to use as the docs content source"
        required: false
        default: main
      source_sha:
        description: "oneworks-ai/app commit SHA to use as the docs content source"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GITHUB_TOKEN: ${{ github.token }}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homepage
        uses: actions/checkout@v4
        with:
          path: homepage

      - name: Checkout app docs source
        uses: actions/checkout@v4
        with:
          repository: oneworks-ai/app
          ref: ${{ github.event.inputs.source_sha || github.event.inputs.source_ref || 'main' }}
          path: app

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: homepage/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: homepage

      - name: Build sites
        run: pnpm build
        working-directory: homepage
        env:
          GH_TOKEN: ${{ github.token }}
          ONEWORKS_DOCS_SOURCE_DIR: ${{ github.workspace }}/app/.oo/docs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: homepage/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
